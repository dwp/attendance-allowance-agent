{% extends "version-1/layouts/internal-layout.html" %}

{% set pageName = "Enter the claimant's nationality" %}

{% block content %}
  <div class="govuk-grid-row">
    <div class="govuk-grid-column-full">

      <form action="check-your-answers" method="post" novalidate>
        <div class="govuk-form-group">
          <fieldset class="govuk-fieldset">
            <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
              <h1 class="govuk-fieldset__heading">
                {{ pageName }}
              </h1>
            </legend>
            {# <input class="govuk-input govuk-input--width-20" id="claimNationality" name="claimNationality" type="text" value="{{data['claimNationality']}}"/> #}
            <label for="my-autocomplete">Select your country</label>
            <div id="location-autocomplete"></div>

            
          </fieldset>
        </div>
        <button type="submit" class="govuk-button" data-module="govuk-button">
          Save and continue
        </button>
      </form>
    </div>
  </div>

  <script type="text/javascript" src="/assets/location-autocomplete.min.js"></script>
  <script type="text/javascript">
    openregisterLocationPicker({
      selectElement: document.getElementById('location-autocomplete'),
      url: '/assets/location-autocomplete-graph.json'
    })
  </script>

{% endblock %}
