{% extends "version-1/layouts/internal-layout.html" %}

{% set pageName = "Enter the claimant's date of birth" %}

{% block content %}
  <div class="govuk-grid-row">
    <div class="govuk-grid-column-full">

      <form action="has-date-of-death" method="post" novalidate>
        <div class="govuk-form-group">
          <fieldset class="govuk-fieldset" role="group" aria-describedby="claimDateOfBirth-hint">
            <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
              
              <h1 class="govuk-fieldset__heading">
                {{ pageName }}
              </h1>
            </legend>
            <div id="claimDateOfBirth-hint" class="govuk-hint">
              For example, 31 3 1980
            </div>
            <div class="govuk-date-input" id="date-of-birth">
              <div class="govuk-date-input__item">
                <div class="govuk-form-group">
                  <label class="govuk-label govuk-date-input__label" for="claimDateOfBirthDD">
                    Day
                  </label>
                  <input class="govuk-input govuk-date-input__input govuk-input--width-2" id="claimDateOfBirthDD" name="claimDateOfBirthDD" type="text" autocomplete="claimDateOfBirthDD" inputmode="numeric" value="{{data['claimDateOfBirthDD']}}">
                </div>
              </div>
              <div class="govuk-date-input__item">
                <div class="govuk-form-group">
                  <label class="govuk-label govuk-date-input__label" for="claimDateOfBirthMM">
                    Month
                  </label>
                  <input class="govuk-input govuk-date-input__input govuk-input--width-2" id="claimDateOfBirthMM" name="claimDateOfBirthMM" type="text" autocomplete="claimDateOfBirthMM" inputmode="numeric" value="{{data['claimDateOfBirthMM']}}">
                </div>
              </div>
              <div class="govuk-date-input__item">
                <div class="govuk-form-group">
                  <label class="govuk-label govuk-date-input__label" for="claimDateOfBirthYYYY">
                    Year
                  </label>
                  <input class="govuk-input govuk-date-input__input govuk-input--width-4" id="claimDateOfBirthYYYY" name="claimDateOfBirthYYYY" type="text" autocomplete="claimDateOfBirthYYYY" inputmode="numeric" value="{{data['claimDateOfBirthYYYY']}}">
                </div>
              </div>
            </div>
          </fieldset>
        </div>
        <button type="submit" class="govuk-button" data-module="govuk-button">
          Save and continue
        </button>
      </form>
    </div>
  </div>

{% endblock %}
