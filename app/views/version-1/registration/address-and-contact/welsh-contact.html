{% extends "version-1/layouts/internal-layout.html" %}

{% set pageName = "How does the claimant prefer to be contacted in welsh?" %}

{% block content %}
  <div class="govuk-grid-row">
    <div class="govuk-grid-column-full">

      <form action="have-correspondence-address" method="post" novalidate>
        <div class="govuk-form-group">
          <fieldset class="govuk-fieldset">
            <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
              <h1 class="govuk-fieldset__heading">
                {{ pageName }}
              </h1>
            </legend>
            <div class="govuk-radios" data-module="govuk-radios">
              <div class="govuk-radios__item">
                <input class="govuk-radios__input" id="claimWelshContact" name="claimWelshContact" type="radio" value="Yes, always use Welsh">
                <label class="govuk-label govuk-radios__label" for="claimWelshContact">
                  Yes, always use Welsh
                </label>
              </div>
              <div class="govuk-radios__item">
                <input class="govuk-radios__input" id="claimWelshContact-2" name="claimWelshContact" type="radio" value="Use Welsh when speaking">
                <label class="govuk-label govuk-radios__label" for="claimWelshContact-2">
                  Use Welsh when speaking
                </label>
                <div id="claimWelshContact-2-hint" class="govuk-hint govuk-radios__hint">
                  For example, face to face meetings or phone calls
                </div>
              </div>
              <div class="govuk-radios__item">
                <input class="govuk-radios__input" id="claimWelshContact-3" name="claimWelshContact" type="radio" value="Use Welsh in writing">
                <label class="govuk-label govuk-radios__label" for="claimWelshContact-3">
                  Use Welsh in writing
                </label>
                <div id="claimWelshContact-3-hint" class="govuk-hint govuk-radios__hint">
                  For example, letters and emails
                </div>
              </div>
              <div class="govuk-radios__item">
                <input class="govuk-radios__input" id="claimWelshContact-4" name="claimWelshContact" type="radio" value="No preference ">
                <label class="govuk-label govuk-radios__label" for="claimWelshContact-4">
                  No preference 
                </label>
              </div>
            </div>
          </fieldset>
        </div>
        <button type="submit" class="govuk-button" data-module="govuk-button">
          Save and continue
        </button>
      </form>
    </div>
  </div>

{% endblock %}
