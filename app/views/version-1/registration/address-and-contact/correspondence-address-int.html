{% extends "version-1/layouts/internal-layout.html" %}
{% set pageName = "Enter an address outside of the UK" %}

{% block content %}

  <h1 class="govuk-heading-l">
    {{ pageName }}
  </h1>

  <div class="govuk-grid-row">
    <div class="govuk-grid-column-two-thirds">

      <form method="post" action="mobile-number">
        <fieldset class="govuk-fieldset">
          <div class="govuk-form-group">
            <label class="govuk-label" for="claimCorrespondenceAddress1">
              Address line 1
            </label>
            <input class="govuk-input govuk-!-width-full" id="claimCorrespondenceAddress1" name="claimCorrespondenceAddress1" type="text" value="{{data[claimCorrespondenceAddress1]}}">
          </div>

          <div class="govuk-form-group">
            <label class="govuk-label" for="claimCorrespondenceAddress2">
              Address line 2 (optional)
            </label>
            <input class="govuk-input govuk-!-width-full" id="claimCorrespondenceAddress2" name="claimCorrespondenceAddress2" type="text" value="{{data[claimCorrespondenceAddress2]}}">
          </div>

          <div class="govuk-form-group">
            <label class="govuk-label" for="claimCorrespondenceAddress3">
              Address line 3
            </label>
            <input class="govuk-input govuk-!-width-full" id="claimCorrespondenceAddress3" name="claimCorrespondenceAddress3" type="text" value="{{data[claimCorrespondenceAddress3]}}">
          </div>

          <div class="govuk-form-group">
            <label class="govuk-label" for="claimCorrespondenceAddress4">
              Address line 4 (optional)
            </label>
            <input class="govuk-input govuk-!-width-full" id="claimCorrespondenceAddress4" name="claimCorrespondenceAddress4" type="text" value="{{data[claimCorrespondenceAddress4]}}">
          </div>

          <div class="govuk-form-group">
            <label class="govuk-label" for="claimCorrespondencePostcode">
              Country
            </label>
            <input class="govuk-input govuk-input--width-20" id="claimant-postcode" name="claimCorrespondencePostcode" type="text" value="{{data[claimCorrespondencePostcode]}}">
          </div>
        </fieldset>
        <button type="submit" class="govuk-button" data-module="govuk-button">
          Save and continue
        </button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
