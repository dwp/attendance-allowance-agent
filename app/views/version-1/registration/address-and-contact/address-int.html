{% extends "version-1/layouts/internal-layout.html" %}
{% set pageName = "Enter an address outside of the UK" %}

{% block content %}

  <h1 class="govuk-heading-xl">
    {{ pageName }}
  </h1>

  <div class="govuk-grid-row">
    <div class="govuk-grid-column-two-thirds">

      <form method="post" action="address-start-date">
        <fieldset class="govuk-fieldset">
          <div class="govuk-form-group">
            <label class="govuk-label" for="claimantAddress1">
              Address line 1
            </label>
            <input class="govuk-input govuk-!-width-full" id="claimAddress1" name="claimAddress1" type="text" value="{{data[claimAddress1]}}">
          </div>

          <div class="govuk-form-group">
            <label class="govuk-label" for="claimAddress2">
              Address line 2 (optional)
            </label>
            <input class="govuk-input govuk-!-width-full" id="claimAddress2" name="claimAddress2" type="text" value="{{claimAddress2]}}">
          </div>

          <div class="govuk-form-group">
            <label class="govuk-label" for="claimAddress3">
              Address line 3
            </label>
            <input class="govuk-input govuk-!-width-full" id="claimAddress3" name="claimAddress3" type="text" value="{{data[claimAddress3]}}">
          </div>

          <div class="govuk-form-group">
            <label class="govuk-label" for="claimAddress4">
              Address line 4 (optional)
            </label>
            <input class="govuk-input govuk-!-width-full" id="claimAddress4" name="claimAddress4" type="text" value="{{data[claimAddress4]}}">
          </div>

          <div class="govuk-form-group">
            <label class="govuk-label" for="claimPostcode">
              Country
            </label>
            <input class="govuk-input govuk-input--width-20" id="claimPostcode" name="claimPostcode" type="text" value="{{data[claimPostcode]}}">
          </div>
        </fieldset>
        <button type="submit" class="govuk-button" data-module="govuk-button">
          Save and continue
        </button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
