{% extends "version-1/layouts/internal-layout.html" %}

{% block content %} 

  <div class="govuk-grid-row">
    <div class="govuk-grid-column-full">
      <nav class="dwp-horizontal-navigation govuk-!-margin-bottom-8" aria-label="Horizontal">

          <li class="dwp-horizontal-navigation__item dwp-horizontal-navigation__item--selected">

      <div class="dwp-timeline">
